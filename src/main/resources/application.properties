management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.prometheus.metrics.export.enabled=true
management.otlp.metrics.export.enabled=false
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:}
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=loadbalancerpro
management.metrics.tags.environment=local
management.opentelemetry.resource-attributes[service.name]=loadbalancerpro
management.opentelemetry.resource-attributes[service.version]=1.1.1
management.opentelemetry.resource-attributes[deployment.environment]=local
loadbalancerpro.app.version=1.1.1
loadbalancerpro.telemetry.otlp.require-private-endpoint=true
loadbalancerpro.telemetry.otlp.allow-insecure-localhost=true
loadbalancerpro.telemetry.startup-summary.enabled=true
loadbalancerpro.api.max-request-bytes=16384
loadbalancerpro.api.cors.allowed-origins=http://localhost:3000,http://localhost:8080
loadbalancerpro.auth.mode=api-key
loadbalancerpro.auth.oauth2.issuer-uri=
loadbalancerpro.auth.oauth2.jwk-set-uri=
loadbalancerpro.auth.docs-public=false
loadbalancerpro.auth.required-role.lase-shadow=observer
loadbalancerpro.auth.required-role.allocation=operator
loadbalancerpro.lase.shadow.enabled=false
info.app.name=LoadBalancerPro
info.app.version=1.1.1
info.app.description=Calculation-only load allocation API
