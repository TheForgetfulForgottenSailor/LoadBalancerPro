loadbalancerpro.api.cors.allowed-origins=${LOADBALANCERPRO_CORS_ALLOWED_ORIGINS:}
loadbalancerpro.api.key=${LOADBALANCERPRO_API_KEY:}
loadbalancerpro.lase.shadow.enabled=false
cloud.liveMode=false
