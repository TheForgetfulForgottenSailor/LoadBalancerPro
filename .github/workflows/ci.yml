name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build, Test, Package, Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Java
        # actions/setup-java@v4
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Resolve dependency tree
        run: mvn -B -DskipTests dependency:tree

      - name: Run tests
        run: mvn -B test

      - name: Package executable JAR
        run: mvn -B package

      - name: Generate CycloneDX SBOM
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom -DoutputFormat=all -DoutputDirectory=target -DoutputName=bom -Dcyclonedx.skipAttach=true

      - name: Upload CycloneDX SBOM artifacts
        # actions/upload-artifact@v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: loadbalancerpro-sbom
          path: |
            target/bom.json
            target/bom.xml
          retention-days: 30

      - name: Smoke test LASE demo command
        shell: bash
        run: |
          set -euo pipefail

          assert_contains() {
            local file="$1"
            local expected="$2"
            if ! grep -Fq "$expected" "$file"; then
              echo "Expected to find: $expected"
              cat "$file"
              exit 1
            fi
          }

          assert_not_contains() {
            local file="$1"
            local unexpected="$2"
            if grep -Fq "$unexpected" "$file"; then
              echo "Unexpected output found: $unexpected"
              cat "$file"
              exit 1
            fi
          }

          assert_no_spring_startup() {
            local file="$1"
            assert_not_contains "$file" "Started LoadBalancerApiApplication"
            assert_not_contains "$file" "Tomcat started"
            assert_not_contains "$file" "SpringApplication"
          }

          HEALTHY_LOG="$(mktemp)"
          OVERLOADED_LOG="$(mktemp)"
          INVALID_LOG="$(mktemp)"
          JAR="$(ls -t target/LoadBalancerPro-*.jar | grep -Ev '(-sources|-javadoc|-tests)\.jar$' | head -n 1)"
          test -n "$JAR"

          java -jar "$JAR" --lase-demo=healthy >"$HEALTHY_LOG" 2>&1
          assert_contains "$HEALTHY_LOG" "=== LoadBalancerPro LASE Synthetic Demo ==="
          assert_contains "$HEALTHY_LOG" "Evaluation ID: lase-demo-healthy"
          assert_contains "$HEALTHY_LOG" "synthetic demo"
          assert_contains "$HEALTHY_LOG" "recommendation-only"
          assert_contains "$HEALTHY_LOG" "No live AWS resources touched"
          assert_contains "$HEALTHY_LOG" "No real routing mutation"
          assert_contains "$HEALTHY_LOG" "No CloudManager calls"
          assert_no_spring_startup "$HEALTHY_LOG"

          java -jar "$JAR" --lase-demo=overloaded >"$OVERLOADED_LOG" 2>&1
          assert_contains "$OVERLOADED_LOG" "Evaluation ID: lase-demo-overloaded"
          assert_contains "$OVERLOADED_LOG" "Load Shedding:"
          assert_contains "$OVERLOADED_LOG" "Action: SHED"
          assert_contains "$OVERLOADED_LOG" "Shadow Autoscaling:"
          assert_contains "$OVERLOADED_LOG" "SCALE_UP"
          assert_contains "$OVERLOADED_LOG" "Failure Scenario:"
          assert_no_spring_startup "$OVERLOADED_LOG"

          set +e
          java -jar "$JAR" --lase-demo=invalid-name >"$INVALID_LOG" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "Expected invalid LASE demo scenario to exit 2, got $status"
            cat "$INVALID_LOG"
            exit 1
          fi
          assert_contains "$INVALID_LOG" "Invalid LASE demo scenario"
          assert_contains "$INVALID_LOG" "Valid values:"
          assert_contains "$INVALID_LOG" "healthy"
          assert_contains "$INVALID_LOG" "overloaded"
          assert_not_contains "$INVALID_LOG" "Exception"
          assert_not_contains "$INVALID_LOG" "java.lang"
          assert_no_spring_startup "$INVALID_LOG"

      - name: Smoke test packaged JAR
        shell: bash
        run: |
          set -euo pipefail
          APP_LOG="$(mktemp)"
          JAR="$(ls -t target/LoadBalancerPro-*.jar | grep -Ev '(-sources|-javadoc|-tests)\.jar$' | head -n 1)"
          test -n "$JAR"
          java -jar "$JAR" \
            --server.address=127.0.0.1 \
            --server.port=18080 \
            --spring.profiles.active=local >"$APP_LOG" 2>&1 &
          APP_PID=$!

          cleanup() {
            if kill -0 "$APP_PID" 2>/dev/null; then
              kill "$APP_PID" 2>/dev/null || true
              wait "$APP_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          for attempt in {1..60}; do
            if curl -fsS -o /dev/null http://127.0.0.1:18080/api/health; then
              echo "Packaged JAR smoke test passed."
              exit 0
            fi

            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "Application exited before becoming healthy."
              cat "$APP_LOG"
              exit 1
            fi

            sleep 2
          done

          echo "Application did not return HTTP 200 from /api/health in time."
          cat "$APP_LOG"
          exit 1

      - name: Build Docker image
        run: docker build -t loadbalancerpro:ci .

      - name: Smoke test Docker runtime
        shell: bash
        run: |
          set -euo pipefail
          CONTAINER_NAME="loadbalancerpro-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          cleanup() {
            local status=$?
            if [ "$status" -ne 0 ]; then
              docker logs "$CONTAINER_NAME" 2>/dev/null || true
            fi
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
          }
          trap cleanup EXIT

          docker run --rm -d \
            --name "$CONTAINER_NAME" \
            -p 127.0.0.1:18081:8080 \
            loadbalancerpro:ci

          for attempt in {1..60}; do
            if curl -fsS -o /dev/null http://127.0.0.1:18081/api/health; then
              echo "Docker runtime health endpoint returned HTTP 200."
              break
            fi

            if ! docker ps --format '{{.Names}}' | grep -Fxq "$CONTAINER_NAME"; then
              echo "Container exited before becoming healthy."
              docker logs "$CONTAINER_NAME" 2>/dev/null || true
              exit 1
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "Container did not return HTTP 200 from /api/health in time."
              docker logs "$CONTAINER_NAME" 2>/dev/null || true
              exit 1
            fi

            sleep 2
          done

          for attempt in {1..30}; do
            health_status="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$CONTAINER_NAME")"
            if [ "$health_status" = "healthy" ]; then
              echo "Docker healthcheck is healthy."
              exit 0
            fi
            if [ "$health_status" = "unhealthy" ]; then
              echo "Docker healthcheck became unhealthy."
              docker logs "$CONTAINER_NAME" 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done

          echo "Docker healthcheck did not become healthy in time."
          docker inspect "$CONTAINER_NAME"
          exit 1

      - name: Scan Docker image
        # aquasecurity/trivy-action@0.35.0
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: loadbalancerpro:ci
          format: table
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: '1'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Review dependency changes
        # actions/dependency-review-action@v4
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: high
