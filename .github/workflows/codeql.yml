name: CodeQL

on:
  push:
    branches: [loadbalancerpro-clean]
  pull_request:
    branches: [loadbalancerpro-clean]
  schedule:
    - cron: "0 12 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]

    steps:
      - name: Checkout repository
        # actions/checkout@v6
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Java
        # actions/setup-java@v5
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Initialize CodeQL
        # github/codeql-action/init@v4.35.3
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      - name: Build for CodeQL
        run: mvn -B -DskipTests package

      - name: Perform CodeQL Analysis
        # github/codeql-action/analyze@v4.35.3
        uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7
        with:
          category: "/language:${{ matrix.language }}"
